<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>고객 맞춤형 사전 문진표</title>
    <style>
        /* 맥북 및 모바일 맞춤 폰트와 스타일 */
        body { font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; background-color: #f0f4f8; margin: 0; padding: 20px; color: #333; line-height: 1.6; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        h1 { font-size: 26px; color: #0046FF; text-align: center; margin-bottom: 30px; }
        
        .section { margin-bottom: 35px; text-align: left; }
        label { font-size: 20px; font-weight: bold; display: block; margin-bottom: 15px; color: #444; }

        /* 입력창 및 선택창 스타일 */
        select, textarea { width: 100%; padding: 15px; font-size: 18px; border: 2px solid #ddd; border-radius: 12px; box-sizing: border-box; }
        textarea { height: 100px; resize: none; }

        /* 커스텀 라디오 버튼 (타일 형태) */
        .grid-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .grid-item { position: relative; }
        .grid-item input { position: absolute; opacity: 0; cursor: pointer; }
        .grid-item label { 
            display: block; padding: 15px; background: #fff; border: 2px solid #ddd; border-radius: 12px; 
            text-align: center; font-size: 18px; cursor: pointer; transition: 0.2s; font-weight: normal;
