<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스마트 안내</title>
    <style>
        body { font-family: 'Apple SD Gothic Neo', sans-serif; text-align: center; background-color: #f4f6f8; margin: 0; padding: 20px; }
        h1 { color: #333; font-size: 28px; margin-bottom: 10px; }
        p { color: #555; font-size: 18px; margin-bottom: 30px; }
        .btn-container { display: flex; flex-direction: column; gap: 15px; }
        .btn { 
            background-color: #0046FF; 
            color: white; 
            border: none; 
            padding: 25px; 
            font-size: 24px; 
            font-weight: bold; 
            border-radius: 15px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .btn:active { background-color: #0033cc; }
    </style>
</head>
<body>

    <h1>어떤 업무를 도와드릴까요?</h1>
    <p>원하시는 버튼을 가볍게 눌러주세요.</p>

    <div class="btn-container">
        <button class="btn" onclick="alert('창구 직원에게 예금/적금 니즈가 전달되었습니다. 7번 창구로 안내합니다.')">💰 예금 / 적금</button>
        <button class="btn" onclick="alert('창구 직원에게 대출 상담 니즈가 전달되었습니다. 8번 창구로 안내합니다.')">🏠 대출 상담</button>
        <button class="btn" onclick="alert('창구 직원에게 비밀번호 업무가 전달되었습니다. 9번 창구로 안내합니다.')">🔑 비밀번호 변경</button>
    </div>

</body>
</html>
